name: دانلود فایل و ساخت ZIP رمزدار

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'لینک مستقیم فایل مورد نظر'
        required: true
        type: string
      zip_password:
        description: 'رمز عبور برای فایل ZIP'
        required: true
        type: string

permissions:
  contents: write   # اجازه Push به مخزن

jobs:
  download-and-zip:
    runs-on: ubuntu-latest

    steps:
      - name: دریافت کد مخزن
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: دانلود فایل از لینک
        run: |
          curl -L -o downloaded_file "${{ github.event.inputs.file_url }}"
          echo "FILE_NAME=downloaded_file" >> $GITHUB_ENV

      - name: استخراج نام اصلی فایل (اختیاری)
        run: |
          ORIGINAL_NAME=$(basename "${{ github.event.inputs.file_url }}" | cut -d '?' -f1)
          if [ -z "$ORIGINAL_NAME" ]; then
            ORIGINAL_NAME="downloaded_file"
          fi
          echo "ORIGINAL_NAME=$ORIGINAL_NAME" >> $GITHUB_ENV

      - name: ساخت ZIP رمزدار
        run: |
          ZIP_NAME="protected_${ORIGINAL_NAME}.zip"
          zip -P "${{ github.event.inputs.zip_password }}" "$ZIP_NAME" downloaded_file
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Commit و Push فایل ZIP به مخزن
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ env.ZIP_NAME }}"
          git commit -m "Add encrypted zip file from workflow"
          git push
